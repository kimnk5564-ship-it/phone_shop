<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행사폰 - 로그인</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=13">
    <link rel="stylesheet" href="login.css">
    <script>
        // Init dark mode immediately to prevent FOUC
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>

<body class="login-page">
    <div class="login-wrapper">
        <!-- Animated Background Elements -->
        <div class="bg-element elem-1"></div>
        <div class="bg-element elem-2"></div>

        <div class="login-container">
            <div class="login-header" style="position: relative;">
                <button class="theme-toggle" id="theme-toggle" aria-label="다크 모드 전환"
                    style="position: absolute; right: 0; top: 0; background: transparent; border: none; cursor: pointer; color: var(--text-dark);">
                    <svg class="sun-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="moon-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <a href="index.html" class="logo">
                    <span class="logo-icon">📱</span>
                    <span class="logo-text">행사폰</span>
                </a>
                <h2>환영합니다!</h2>
                <p>전국 최저가 보장 핸드폰 성지</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> 자동 로그인
                    </label>
                    <a href="#" class="forgot-password">비밀번호 찾기</a>
                </div>

                <div id="login-error"
                    style="color: red; margin-bottom: 15px; text-align: center; font-size: 0.9rem; display: none;">
                </div>

                <div style="display:flex; flex-direction:column; gap:1rem; margin-top:1rem;">
                    <button type="submit" class="btn-primary w-100 login-submit">로그인 하기</button>

                    <div style="position:relative; text-align:center; margin:0.5rem 0;">
                        <hr style="border:none; border-top:1px solid #e9ecef;">
                        <span
                            style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:#ffffff; padding:0 10px; color:#adb5bd; font-size:0.85rem;">또는</span>
                    </div>

                    <button type="button" class="btn-kakao w-100"
                        style="display:flex; justify-content:center; align-items:center; gap:0.5rem; background:#FEE500; color:#000; border:none; padding:1rem; border-radius:50px; font-weight:800; font-size:1rem; cursor:pointer; transition:all 0.3s ease; box-shadow:0 4px 10px rgba(254, 229, 0, 0.2);"
                        onclick="Auth.loginWithKakao()">
                        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 3c-5.523 0-10 3.582-10 8 0 2.862 1.83 5.378 4.606 6.81l-1.127 4.197c-.12.45.385.808.77.562l4.893-3.11c.928.232 1.895.34 2.858.34 5.523 0 10-3.581 10-8s-4.477-8-10-8zm0 13c-3.866 0-7-2.686-7-6s3.134-6 7-6 7 2.686 7 6-3.134 6-7 6z" />
                        </svg>
                        카카오로 3초만에 시작하기
                    </button>
                </div>
            </form>

            <div class="signup-prompt">
                계정이 없으신가요? <a href="register.html">회원가입</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Compat version for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>

    <!-- Kakao SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/1.43.1/kakao.min.js"></script>
    <!-- Auth Script -->
    <script src="auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const id = document.getElementById('username').value;
            const pw = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');

            errorDiv.style.display = 'none';
            const btn = document.querySelector('.login-submit');
            btn.textContent = '로그인 중...';
            btn.disabled = true;

            const result = await Auth.login(id, pw);

            if (result.success) {
                alert(result.user.name + '님 환영합니다!');
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = result.message;
                errorDiv.style.display = 'block';
                btn.textContent = '로그인';
                btn.disabled = false;
            }
        });
    </script>
    <script src="ui-enhancements.js"></script>
</body>

</html>
