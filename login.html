<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행사폰 - 로그인</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="login.css">
</head>

<body class="login-page">
    <div class="login-wrapper">
        <!-- Animated Background Elements -->
        <div class="bg-element elem-1"></div>
        <div class="bg-element elem-2"></div>

        <div class="login-container">
            <div class="login-header">
                <a href="admin.html" class="admin-btn" style="display: none;">관리자 페이지</a>
                <a href="profile.html" class="profile-btn" style="display: none;">내정보</a>
                <a href="reviews.html" class="reviews-btn" style="color: var(--primary-color);">구매 후기</a>
                <a href="index.html" class="logo">
                    <span class="logo-icon">📱</span>
                    <span class="logo-text">행사폰</span>
                </a>
                <h2>환영합니다!</h2>
                <p>전국 최저가 보장 핸드폰 성지</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="input-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> 자동 로그인
                    </label>
                    <a href="#" class="forgot-password">비밀번호 찾기</a>
                </div>

                <div id="login-error"
                    style="color: red; margin-bottom: 15px; text-align: center; font-size: 0.9rem; display: none;">
                </div>

                <button type="submit" class="btn-primary w-100 login-submit">로그인</button>
            </form>

            <div class="signup-prompt">
                계정이 없으신가요? <a href="register.html">회원가입</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Compat version for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <!-- Auth Script -->
    <script src="auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const id = document.getElementById('username').value;
            const pw = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');

            errorDiv.style.display = 'none';
            const btn = document.querySelector('.login-submit');
            btn.textContent = '로그인 중...';
            btn.disabled = true;

            const result = await Auth.login(id, pw);

            if (result.success) {
                alert(result.user.name + '님 환영합니다!');
                window.location.href = 'index.html';
            } else {
                errorDiv.textContent = result.message;
                errorDiv.style.display = 'block';
                btn.textContent = '로그인';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
