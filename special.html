<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행사폰 - 오늘의 특가</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=13">
    <style>
        .page-header-spacing {
            padding-top: 80px;
            background: linear-gradient(135deg, var(--bg-light) 0%, var(--white) 100%);
            min-height: 100vh;
        }

        .benefit-list {
            list-style: none;
            text-align: left;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background-color: #f8f9fa;
            border-radius: 12px;
        }

        .benefit-list li {
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #495057;
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .benefit-list li::before {
            content: '🎁';
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .benefit-list {
                margin-top: 0.5rem;
                margin-bottom: 0.5rem;
                padding: 0.4rem;
                border-radius: 8px;
            }

            .benefit-list li {
                margin-bottom: 0.3rem;
                font-size: 0.65rem;
                gap: 0.2rem;
                letter-spacing: -0.5px;
            }

            .benefit-list li::before {
                font-size: 0.7rem;
            }

            .card .cta-button {
                padding: 0.4rem 0.2rem !important;
                font-size: 0.75rem !important;
                width: 100%;
                box-sizing: border-box;
                white-space: nowrap;
            }
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="행사폰 로고" class="header-logo">
            </a>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav class="nav-links">
                <a href="special.html" style="color: var(--primary-color);">오늘의 특가</a>
                <a href="prices.html">시세표</a>
                <a href="reviews.html">구매 후기</a>
                <a href="index.html#location">성지찾기</a>
                <a href="index.html#support">고객센터</a>
                <a href="admin.html" class="admin-btn" style="display: none;">관리자 페이지</a>
                <a href="profile.html" class="profile-btn" style="display: none;">내정보</a>
                <a href="login.html" class="login-btn">로그인/회원가입</a>
            </nav>
        </div>
    </header>

    <main class="page-header-spacing">
        <section class="section">
            <div class="container section-inner text-center">
                <h2 class="section-title">오늘의 <span>단독 특가</span></h2>
                <p class="section-desc">한정 수량 진행! 행사폰에서만 만날 수 있는 압도적인 혜택과 특가를 확인하세요.</p>

                <!-- Countdown Timer -->
                <div id="special-timer-box" class="special-timer-box">
                    <div class="timer-label">🚨 특가 종료까지 남은 시간</div>
                    <div id="countdown-clock" class="countdown-clock">00:00:00</div>
                </div>

                <div class="grid cards-grid" id="specials-list-container">
                    <!-- Cards will be populated dynamically by special.js -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-info">
                <h3 class="footer-logo">행사폰</h3>
                <p>상호: (주)행사폰 | 대표: 홍길동 | 사업자등록번호: 123-45-67890</p>
                <p>통신판매업신고: 제2026-서울강남-0001호 | 소재지: 서울특별시 강남구 테헤란로 123</p>
                <p class="copyright">© 2026 행사폰. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Firebase SDK (Compat version for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="auth.js"></script>
    <script src="mobile-nav.js"></script>
    <script src="special.js"></script>
</body>

</html>
