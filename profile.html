<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행사폰 - 내정보</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="profile.css">
</head>

<body class="profile-page">
    <header class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <span class="logo-icon">📱</span>
                <span class="logo-text">행사폰</span>
            </a>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav class="nav-links">
                <a href="special.html">오늘의 특가</a>
                <a href="prices.html">시세표</a>
                <a href="reviews.html">구매 후기</a>
                <a href="index.html#location">성지찾기</a>
                <a href="index.html#support">고객센터</a>
                <a href="admin.html" class="admin-btn" style="display: none;">관리자 페이지</a>
                <a href="profile.html" class="profile-btn" style="color: var(--primary-color);">내정보</a>
                <a href="login.html" class="login-btn">로그아웃</a>
            </nav>
        </div>
    </header>

    <!-- Animated Background Elements -->
    <div class="bg-element elem-1"></div>
    <div class="bg-element elem-2"></div>

    <div class="profile-container">
        <div class="profile-header">
            <h2>내 계정 정보</h2>
            <p>회원님의 소중한 정보를 관리하세요.</p>
        </div>

        <div class="user-info-card">
            <div class="info-row">
                <span class="info-label">아이디</span>
                <span class="info-value" id="profile-id">로딩 중...</span>
            </div>
            <div class="info-row">
                <span class="info-label">이름(닉네임)</span>
                <span class="info-value" id="profile-name">로딩 중...</span>
            </div>
            <div class="info-row">
                <span class="info-label">회원 등급</span>
                <span class="info-value"><span class="role-badge" id="profile-role">로딩 중...</span></span>
            </div>
        </div>

        <h3 class="password-section-title">닉네임 변경</h3>
        <form id="nameForm">
            <div class="input-group">
                <label for="new-name">새 닉네임</label>
                <input type="text" id="new-name" placeholder="새로운 닉네임을 입력하세요" required minlength="2">
            </div>
            <div id="name-error"
                style="color: red; margin-bottom: 15px; text-align: center; font-size: 0.9rem; display: none;"></div>
            <button type="submit" class="btn-primary w-100 name-submit" style="margin-bottom: 2rem;">닉네임 변경하기</button>
        </form>

        <h3 class="password-section-title">비밀번호 변경</h3>
        <form id="passwordForm">
            <div class="input-group">
                <label for="new-pw">새 비밀번호</label>
                <input type="password" id="new-pw" placeholder="새로운 비밀번호 (6자리 이상 입력)" required minlength="6">
            </div>
            <div class="input-group">
                <label for="new-pw-confirm">새 비밀번호 확인</label>
                <input type="password" id="new-pw-confirm" placeholder="새 비밀번호를 다시 한 번 입력하세요" required minlength="6">
            </div>

            <div id="pw-error"
                style="color: red; margin-bottom: 15px; text-align: center; font-size: 0.9rem; display: none;"></div>

            <button type="submit" class="btn-primary w-100 pw-submit">비밀번호 변경하기</button>
        </form>
    </div>

    <!-- Firebase SDK (Compat version for simplicity) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>
    <script src="auth.js"></script>
    <script src="mobile-nav.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Load User Information
            firebase.auth().onAuthStateChanged((user) => {
                if (!user) {
                    alert('로그인이 필요한 서비스입니다.');
                    window.location.href = 'login.html';
                    return;
                }

                const currentUser = Auth.getCurrentUser();
                if (currentUser) {
                    document.getElementById('profile-id').textContent = currentUser.username;
                    document.getElementById('profile-name').textContent = currentUser.name;

                    const roleBadge = document.getElementById('profile-role');
                    if (currentUser.isAdmin) {
                        roleBadge.textContent = '최고 관리자';
                        roleBadge.classList.add('admin');
                    } else {
                        roleBadge.textContent = '일반 회원';
                        roleBadge.classList.remove('admin');
                    }
                }
            });

            // Handle Name Change
            document.getElementById('nameForm').addEventListener('submit', async function (e) {
                e.preventDefault();

                const newName = document.getElementById('new-name').value.trim();
                const errorDiv = document.getElementById('name-error');
                const btn = document.querySelector('.name-submit');

                errorDiv.style.display = 'none';

                if (newName.length < 2) {
                    errorDiv.textContent = '닉네임은 2글자 이상 입력해주세요.';
                    errorDiv.style.display = 'block';
                    return;
                }

                btn.textContent = '변경 중...';
                btn.disabled = true;

                try {
                    const user = firebase.auth().currentUser;
                    if (user) {
                        await user.updateProfile({ displayName: newName });
                        alert('닉네임이 성공적으로 변경되었습니다!');
                        document.getElementById('profile-name').textContent = newName;
                        document.getElementById('nameForm').reset();
                    } else {
                        throw new Error('로그인 세션 만료');
                    }
                } catch (error) {
                    console.error("Name Update Error:", error);
                    errorDiv.textContent = '닉네임 변경 중 시스템 오류가 발생했습니다.';
                    errorDiv.style.display = 'block';
                } finally {
                    btn.textContent = '닉네임 변경하기';
                    btn.disabled = false;
                }
            });

            // 2. Handle Password Change
            document.getElementById('passwordForm').addEventListener('submit', async function (e) {
                e.preventDefault();

                const pw = document.getElementById('new-pw').value;
                const pwConfirm = document.getElementById('new-pw-confirm').value;
                const errorDiv = document.getElementById('pw-error');
                const btn = document.querySelector('.pw-submit');

                errorDiv.style.display = 'none';

                if (pw !== pwConfirm) {
                    errorDiv.textContent = '새로운 비밀번호가 서로 일치하지 않습니다.';
                    errorDiv.style.display = 'block';
                    return;
                }

                if (pw.length < 6) {
                    errorDiv.textContent = '비밀번호는 6자리 이상이어야 합니다.';
                    errorDiv.style.display = 'block';
                    return;
                }

                btn.textContent = '변경 중...';
                btn.disabled = true;

                try {
                    const user = firebase.auth().currentUser;
                    if (user) {
                        await user.updatePassword(pw);
                        alert('비밀번호가 성공적으로 변경되었습니다! 보안을 위해 다시 로그인해 주세요.');
                        await Auth.logout();
                        window.location.href = 'login.html';
                    } else {
                        throw new Error('로그인 세션 만료');
                    }
                } catch (error) {
                    console.error("Password Update Error:", error);
                    if (error.code === 'auth/requires-recent-login') {
                        alert('서버 보안 원칙에 따라, 비밀번호를 변경하려면 방금 막 로그인한 상태여야 합니다. \n\n지금 자동으로 자동 로그아웃 처리되니, 다시 한 번 로그인 하신 직후에 바로 비밀번호를 변경해 주세요!');
                        await Auth.logout();
                        window.location.href = 'login.html';
                    } else if (error.code === 'auth/weak-password') {
                        errorDiv.textContent = '비밀번호가 너무 단순합니다. 문자나 숫자를 조합하여 더 복잡하게 만들어주세요.';
                        errorDiv.style.display = 'block';
                    } else {
                        errorDiv.textContent = '비밀번호 변경 중 시스템 오류가 발생했습니다. (' + error.code + ')';
                        errorDiv.style.display = 'block';
                    }
                    btn.textContent = '비밀번호 변경하기';
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>

</html>
