<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행사폰 - 회원가입</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
    <link rel="stylesheet" href="login.css">
    <style>
        .register-page {
            /* login.css ë¥¼ ì¬ì¬ì©íë¯ë¡ height íì¥ */
            height: auto;
            min-height: 100vh;
            padding: 4rem 1rem;
        }

        .register-container {
            margin: 0 auto;
        }
    </style>
</head>

<body class="login-page register-page">
    <div class="login-wrapper">
        <!-- Animated Background Elements -->
        <div class="bg-element elem-1"></div>
        <div class="bg-element elem-2"></div>

        <div class="login-container register-container">
            <div class="login-header">
                <a href="index.html" class="logo">
                    <span class="logo-icon">📱</span>
                    <span class="logo-text">행사폰</span>
                </a>
                <h2>회원가입</h2>
                <p>최소한의 정보로 빠르게 가입하세요</p>
            </div>

            <form class="login-form" id="registerForm">
                <div class="input-group">
                    <label for="reg-id">아이디</label>
                    <input type="text" id="reg-id" placeholder="사용할 아이디를 입력하세요" required>
                </div>
                <!-- 최소 정보 수집을 위해 이메일/전화번호 제외 -->
                <div class="input-group">
                    <label for="reg-name">이름 (또는 닉네임)</label>
                    <input type="text" id="reg-name" placeholder="이름 또는 닉네임을 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="reg-pw">비밀번호</label>
                    <input type="password" id="reg-pw" placeholder="비밀번호를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="reg-pw-confirm">비밀번호 확인</label>
                    <input type="password" id="reg-pw-confirm" placeholder="비밀번호를 다시 한 번 입력하세요" required>
                </div>

                <div id="reg-error"
                    style="color: red; margin-bottom: 15px; text-align: center; font-size: 0.9rem; display: none;">
                </div>

                <div style="display:flex; flex-direction:column; gap:1rem; margin-top:1rem;">
                    <button type="submit" class="btn-primary w-100 login-submit">회원가입하기</button>

                    <div style="position:relative; text-align:center; margin:0.5rem 0;">
                        <hr style="border:none; border-top:1px solid #e9ecef;">
                        <span
                            style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:var(--white); padding:0 10px; color:#adb5bd; font-size:0.85rem;">또는</span>
                    </div>

                    <button type="button" class="btn-kakao w-100"
                        style="display:flex; justify-content:center; align-items:center; gap:0.5rem; background:#FEE500; color:#000; border:none; padding:1rem; border-radius:50px; font-weight:800; font-size:1rem; cursor:pointer; transition:all 0.3s ease; box-shadow:0 4px 10px rgba(254, 229, 0, 0.2);"
                        onclick="Auth.loginWithKakao()">
                        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M12 3c-5.523 0-10 3.582-10 8 0 2.862 1.83 5.378 4.606 6.81l-1.127 4.197c-.12.45.385.808.77.562l4.893-3.11c.928.232 1.895.34 2.858.34 5.523 0 10-3.581 10-8s-4.477-8-10-8zm0 13c-3.866 0-7-2.686-7-6s3.134-6 7-6 7 2.686 7 6-3.134 6-7 6z" />
                        </svg>
                        카카오로 3초만에 가입하기
                    </button>
                </div>
            </form>

            <div class="signup-prompt">
                이미 계정이 있으신가요? <a href="login.html">로그인</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>

    <!-- Kakao SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.6.0/kakao.min.js"
        integrity="sha384-6MFdIr0zOira1CHQkedUqJVql0YtcZA1P0nbPrQYJ5/FbsbjdBvVepZ025Z+032T"
        crossorigin="anonymous"></script>
    <!-- Auth Script -->
    <script src="auth.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const id = document.getElementById('reg-id').value;
            const name = document.getElementById('reg-name').value;
            const pw = document.getElementById('reg-pw').value;
            const pwConfirm = document.getElementById('reg-pw-confirm').value;
            const errorDiv = document.getElementById('reg-error');

            errorDiv.style.display = 'none';

            if (id.length < 4) {
                errorDiv.textContent = '아이디는 4자리 이상이어야 합니다.';
                errorDiv.style.display = 'block';
                return;
            }

            if (pw !== pwConfirm) {
                errorDiv.textContent = '비밀번호가 일치하지 않습니다.';
                errorDiv.style.display = 'block';
                return;
            }

            const btn = document.querySelector('.login-submit');
            btn.textContent = '가입 처리 중...';
            btn.disabled = true;

            const result = await Auth.register(id, pw, name);

            if (result.success) {
                alert(result.message);
                window.location.href = 'login.html';
            } else {
                errorDiv.textContent = result.message;
                errorDiv.style.display = 'block';
                btn.textContent = '가입하기';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
