<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Injecting Dummy Reviews</title>
</head>

<body>
    <h2>Injecting 15 Dummy Reviews into Firestore...</h2>
    <div id="log"></div>
    <script>
        const projectId = "phoneshop-37f7a";
        const url = `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/reviews`;
        const logDiv = document.getElementById("log");

        const names = ["김*호", "이*지", "박*민", "정*우", "강*영", "최*준", "윤*서", "장*훈", "임*하", "한*석"];
        const models = ["아이폰 17 Pro 256GB", "갤럭시 S26 울트라", "아이폰 17 기본형", "Z플립 7", "아이폰 17 Pro Max", "갤럭시 S26 Plus"];
        const locations = ["성남점", "양천점", "영등포점", "광명점", "하남점"];
        const contents = [
            "성지라고 해서 반신반의했는데 정말 저렴하게 잘 바꿨습니다.",
            "친절하고 개통도 정말 빠르네요. 다음에도 여기서 바꿀게요!",
            "가격은 만족스러웠는데 사람이 너무 많아서 조금 기다렸습니다. 그래도 혜택은 최고여서 별 4개!",
            "제가 사는 곳에서 멀지 않아서 방문했습니다. 상담사분이 친절하게 요금제 설명 잘 해주셔서 믿음 가네요.",
            "역시 성지답게 가격비교 해본 곳 중 최저가였습니다 ㅋㅋ 지인들한테도 벌써 다 추천했습니다!",
            "동네 대리점보다 20~30만원은 싸게 산 것 같아요. 대박입니다.",
            "사은품도 챙겨주시고 개통 조건도 투명해서 좋았어요.",
            "최신폰 비싸서 고민했는데 여기서 할인 많이 받고 샀습니다.",
            "친구 소개로 왔는데 역시 찐 성지 맞네요!!",
            "개통 당일에 바로 돼서 너무 기분 좋아요. 감사합니다~"
        ];

        async function inject() {
            let successCount = 0;
            for (let i = 0; i < 15; i++) {
                const name = names[Math.floor(Math.random() * names.length)];
                const model = models[Math.floor(Math.random() * models.length)];
                const location = locations[Math.floor(Math.random() * locations.length)];
                const content = contents[Math.floor(Math.random() * contents.length)];
                const rating = Math.random() > 0.2 ? 5 : 4;

                const ts = new Date(Date.now() - Math.random() * 5 * 24 * 60 * 60 * 1000).toISOString();

                const data = {
                    fields: {
                        authorName: { stringValue: name },
                        rating: { integerValue: rating },
                        model: { stringValue: model },
                        location: { stringValue: location },
                        content: { stringValue: content },
                        timestamp: { timestampValue: ts }
                    }
                };

                try {
                    const resp = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    });
                    if (resp.ok) {
                        logDiv.innerHTML += `<p>✅ Added: ${name} (${rating} 🌟)</p>`;
                        successCount++;
                    } else {
                        logDiv.innerHTML += `<p>❌ Failed to add: ${await resp.text()}</p>`;
                    }
                } catch (e) {
                    logDiv.innerHTML += `<p>❌ Error: ${e.message}</p>`;
                }
            }
            logDiv.innerHTML += `<h3>🎉 Done! Added ${successCount} reviews. You can safely close this window now.</h3>`;
        }

        inject();
    </script>
</body>

</html>
